<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Representaciones de Matrices/Grafos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Representaciones de Grafos</h1>
        
        <div class="input-section">
            <label for="nodos">Número de nodos:</label>
            <input type="number" id="nodos" min="1" value="4">
        </div>
        
        <div class="edges-section">
            <h3>Aristas (pares de nodos con peso) - Se comienza desde el número 0</h3>
            <div id="edges-container">
                <div class="edge-input">
                    <input type="number" class="from" min="0" value="0">
                    <span> — </span>
                    <input type="number" class="to" min="0" value="1">
                    <span> Peso: </span>
                    <input type="number" class="weight" min="0" value="1">
                    <button class="remove-edge">Eliminar</button>
                </div>
            </div>
            <button id="add-edge">Agregar arista</button>
        </div>
        
        <button id="generate">Generar Representaciones</button>
        
        <div class="output-section">
            <h3>Matriz de Adyacencia</h3>
            <div id="adjacency-matrix"></div>
            
            <h3>Lista de Adyacencia</h3>
            <div id="adjacency-list"></div>
            
            <h3>Matriz de Incidencia</h3>
            <div id="incidence-matrix"></div>
            
            <h3>Lista de Aristas</h3>
            <div id="edge-list"></div>
            
            <h3>Resultados de Dijkstra</h3>
            <div id="shortest-paths"></div>
            
            <h3>Buscar Camino Más Corto</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <select id="start-node" style="padding: 6px; border-radius: 6px; border: 1px solid #ccc;">
                    <option value="">Seleccionar nodo origen</option>
                </select>
                <select id="end-node" style="padding: 6px; border-radius: 6px; border: 1px solid #ccc;">
                    <option value="">Seleccionar nodo destino</option>
                </select>
                <button onclick="buscarCaminoMasCorto()">Buscar</button>
            </div>
            <div id="shortest-path-result" style="padding: 10px; background: #f0f8ff; border-radius: 6px; display: none;"></div>
            
            <h3>Gráfico del Grafo</h3>
            <div id="graph"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
